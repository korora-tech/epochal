# Add 'documentation' label to any change in docs or markdown files
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

# Add 'tests' label to test changes
tests:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/bdd-tests/**'
      - 'features/**'
      - '**/*_test.rs'
      - '**/*_tests.rs'

# Add 'ci' label to CI/CD changes
ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'

# Add 'app' label to main application changes
app:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/epochal-app/**'

# Add 'dependencies' label to dependency changes
dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'flake.nix'
      - 'flake.lock'

# Add 'blueprint' label to Blueprint UI changes
blueprint:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.blp'
      - '**/*.ui'