name: Cross-Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            deps: |
              sudo apt-get update
              sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libgirepository1.0-dev
          
          - name: macOS
            os: macos-latest
            target: x86_64-apple-darwin
            deps: |
              brew install gtk4 libadwaita
          
          # Windows support requires more work with GTK4 setup
          # Uncomment when ready to support Windows
          # - name: Windows
          #   os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   deps: |
          #     # Windows GTK4 setup would go here
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: ${{ matrix.platform.deps }}
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.platform.target }}
    
    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ matrix.platform.target }}-
          ${{ runner.os }}-cargo-
    
    - name: Build
      run: cargo build --target ${{ matrix.platform.target }} --verbose
    
    - name: Build release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: cargo build --target ${{ matrix.platform.target }} --release --verbose
    
    - name: Upload artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: epochal-${{ matrix.platform.name }}-${{ matrix.platform.target }}
        path: target/${{ matrix.platform.target }}/release/epochal-app*
        retention-days: 7